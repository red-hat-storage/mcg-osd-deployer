# https://prometheus.io/docs/practices/rules/#naming-and-aggregation
# https://github.com/noobaa/noobaa-operator/blob/08a6a4e23e04ef635c6d060298a90ee57b3b67df/deploy/crds/noobaa.io_noobaas_crd.yaml#L14
 groups:
   - name: noobaa-telemeter.rules
     rules:
       - expr: |
           max(NooBaa_num_buckets_claims{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_num_buckets_claims:max
       - expr: |
           max(NooBaa_num_unhealthy_bucket_claims{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_num_unhealthy_bucket_claims:max
       - expr: |
           max(NooBaa_num_unhealthy_namespace_buckets{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_total_unhealthy_namespace_buckets:max
       - expr: |
           max(NooBaa_num_namespace_buckets{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_namespace_bucket_count:max
       - expr: |
           max(NooBaa_accounts_num{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_accounts_num:max
       - expr: |
           max(NooBaa_total_usage{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_total_usage:max
       - expr: |
            max(NooBaa_num_unhealthy_namespace_resources{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_num_unhealthy_namespace_resources:max
       - expr: |
           max(NooBaa_num_namespace_resources{namespace="redhat-data-federation"}) without (instance)
         labels:
           origin: data-federation-service
         record: namespace:noobaa_num_namespace_resources:max
       - expr: |
           NooBaa_namespace_resource_status{namespace="redhat-data-federation"}
         labels:
           origin: data-federation-service
         record: namespace:noobaa_namespace_resource_status
       - expr: |
           NooBaa_namespace_bucket_status{namespace="redhat-data-federation"}
         labels:
           origin: data-federation-service
         record: namespace:noobaa_namespace_bucket_status
   - name: noobaa-internal.rules
     rules:
       - expr: |
           NooBaa_odf_health_status{namespace="redhat-data-federation"}
         labels:
           system_type: NooBaa
           system_vendor: Red Hat
           origin: data-federation-service
         record: namespace:noobaa_system_health_status
   - name: bucket-state-alert.rules
     rules:
       - alert: NooBaaBucketPolicyErrorState
         annotations:
           description: A Bucket Policy {{ $labels.bucket_name }} is in error
             state for more than 5m
           summary: A Bucket Policy Is In Error State
         expr: |
           NooBaa_namespace_bucket_status{bucket_name=~".*"} == 0
         for: 5m
         labels:
           severity: warning
           origin: data-federation-service
   - name: resource-state-alert.rules
     rules:
       - alert: NooBaaCacheBucketErrorState
         annotations:
           description: The Cache Bucket {{ $labels.resource_name }} is in error state
             for more than 5m
           summary: The Cache Bucket Is In Error State
         expr: |
           NooBaa_resource_status{resource_name=~"noobaa-default-backing-store"} == 0
         for: 5m
         labels:
           severity: warning
           origin: data-federation-service
       - alert: NooBaaDataSourceErrorState
         annotations:
           description: A Data Source {{ $labels.namespace_resource_name
             }} is in error state for more than 5m
           summary: A Data Source Is In Error State
         expr: |
           NooBaa_namespace_resource_status{namespace_resource_name=~".*"} == 0
         for: 5m
         labels:
           severity: warning
           origin: data-federation-service
